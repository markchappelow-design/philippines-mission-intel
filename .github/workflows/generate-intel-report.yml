name: Generate Philippines Intel Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GDRIVE_LATEST_FOLDER_ID: ${{ secrets.GDRIVE_LATEST_FOLDER_ID }}
      GDRIVE_ARCHIVE_FOLDER_ID: ${{ secrets.GDRIVE_ARCHIVE_FOLDER_ID }}
      OUTPUT_PDF: outputs/latest/philippines_mission_intel_status_report_latest.pdf

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client google-auth

      - name: Generate report
        run: |
          python generate_report.py

      - name: Verify PDF exists
        run: |
          test -f "$OUTPUT_PDF"

      - name: Restore OAuth token
        shell: python
        env:
          GDRIVE_OAUTH_TOKEN: ${{ secrets.GDRIVE_OAUTH_TOKEN }}
        run: |
          import base64
          import os
          from pathlib import Path

          token = os.environ["GDRIVE_OAUTH_TOKEN"].strip()
          Path("token.json").write_bytes(base64.b64decode(token))
          print("token.json restored")

      - name: Upload to Google Drive
        run: |
          python cloud_upload.py