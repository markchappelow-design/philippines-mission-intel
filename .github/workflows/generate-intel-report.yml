name: Generate Philippines Intel Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
        GOOGLE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON }}
        GDRIVE_LATEST_FOLDER_ID: ${{ secrets.GDRIVE_LATEST_FOLDER_ID }}
        GDRIVE_ARCHIVE_FOLDER_ID: ${{ secrets.GDRIVE_ARCHIVE_FOLDER_ID }}
        OUTPUT_PDF: outputs/latest/philippines_mission_intel_status_report_latest.pdf

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-api-python-client google-auth

      - name: Generate report
        run: |
          python generate_report.py

      - name: Verify PDF exists
        run: |
          test -f "$OUTPUT_PDF"

      - name: Restore OAuth token
        env:
          GOOGLE_OAUTH_TOKEN_JSON_B64: ${{ secrets.GOOGLE_OAUTH_TOKEN_JSON_B64 }}
        run: |
          python - <<'PY'
          import base64, json, os
          from pathlib import Path

          raw = os.environ.get("GOOGLE_OAUTH_TOKEN_JSON_B64", "")
          if not raw:
              raise SystemExit("GOOGLE_OAUTH_TOKEN_JSON_B64 is EMPTY")

          data = json.loads(base64.b64decode(raw).decode("utf-8"))
          Path("token.json").write_text(json.dumps(data), encoding="utf-8")
          print("token.json bytes:", Path("token.json").stat().st_size)
          PY

          python -m json.tool token.json > /dev/null      

      - name: Upload to Google Drive
        run: |
          ls -l token.json
          python cloud_upload.py